services:
  - type: web
    name: livekit-token-service
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LIVEKIT_API_KEY_RTX
        sync: false
      - key: LIVEKIT_API_SECRET_RTX
        sync: false
    autoDeploy: true